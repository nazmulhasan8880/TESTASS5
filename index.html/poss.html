<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- Card -->
<div class="bg-white w-full max-w-md p-8 rounded-xl shadow-md">

<!-- Logo -->
<div class="flex justify-center mb-4">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-16">
</div>

<!-- Title -->
<h2 class="text-center text-xl font-semibold text-gray-800">
GitHub Issues Tracker
</h2>

<p class="text-center text-gray-500 text-sm mb-6">
Sign in to manage your issues
</p>

<!-- Username -->
<label class="text-sm font-medium text-gray-700">
Username
</label>

<input id="username"
type="text"
placeholder="Enter Username"
class="w-full mt-1 p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">

<p class="text-xs text-purple-600 mt-1 mb-4">
Default: admin
</p>

<!-- Password -->
<label class="text-sm font-medium text-gray-700">
Password
</label>

<input id="password"
type="password"
placeholder="Enter Password"
class="w-full mt-1 p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">

<p class="text-xs text-purple-600 mt-1 mb-5">
Default: admin123
</p>

<!-- Button -->
<button onclick="login()"
class="w-full py-2 text-white font-medium rounded-md 
bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90">
Sign In
</button>

<!-- Divider -->
<div class="flex items-center my-6">
<div class="flex-grow h-px bg-gray-300"></div>
<span class="px-3 text-sm text-gray-500">OR</span>
<div class="flex-grow h-px bg-gray-300"></div>
</div>

<!-- Demo Credentials -->
<p class="text-center text-xs text-gray-500 mb-2">
Demo Credentials:
</p>

<div class="bg-gray-100 rounded-md p-4 text-sm text-gray-700 text-center">
<p><span class="font-semibold">Username:</span> admin</p>
<p><span class="font-semibold">Password:</span> admin123</p>
</div>

</div>

<script>

function login(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

if(username === "admin" && password === "admin123"){
window.location.href = "dashboard.html"
}else{
alert("Invalid Username or Password")
}

}

</script>

</body>
</html>
