<!DOCTYPE html>
<html>
<head>
<title>Issues Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="styles.css/styles.css">
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="bg-white shadow-sm border-b">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-2">

<img src="images/github-logo.png" class="w-7">

<h2 class="font-semibold text-lg">
GitHub Issues Tracker
</h2>

</div>

<div class="flex gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded-md px-3 py-1 text-sm w-60"
>

<button

class="bg-gradient-to-r from-purple-600 to-indigo-500 text-white px-4 py-1 rounded-md text-sm">
Search
</button>


</div>

</div>

</div>

<!-- CONTENT -->

<div class="max-w-7xl mx-auto mt-8">

<!-- Tabs -->

<div class="bg-white rounded-lg shadow-sm p-4 mb-6">

<div class="flex gap-3">

<button 
class="tab px-5 py-1 rounded bg-purple-600 text-white text-sm">
All
</button>

<button 
class="tab px-5 py-1 rounded bg-gray-200 text-sm">
Open
</button>

<button 
class="tab px-5 py-1 rounded bg-gray-200 text-sm">
Closed
</button>

</div>

</div>

<!-- Issue Summary -->

<div class="bg-white rounded-lg shadow-sm p-5 mb-6 flex justify-between items-center">
  

<div class="flex gap-1.5">
    
<img src="images/Aperture.png" class="w-10">
<div> 
<h3 class="text-lg font-semibold">
<span id="issueCount">0</span> Issues
</h3>

<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>
</div> 

</div>

<div class="flex gap-5 text-sm">

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</div>

<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</div>

</div>

</div>

<script src="java.js/scrip.js"></script>

</body>
</html>
